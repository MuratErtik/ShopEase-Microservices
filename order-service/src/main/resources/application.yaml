server:
  port: 8085

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: OrderServiceHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
        prefetch: 10
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

messaging:
  exchanges:
    order: order.events
    inventory: inventory.events
    payment: payment.events
  queues:
    stock-reserved: order.stock.reserved.queue
    stock-reservation-failed: order.stock.reservation.failed.queue
    payment-completed: order.payment.completed.queue
    payment-failed: order.payment.failed.queue
  routing-keys:
    order-created: order.created
    stock-reserved: stock.reserved
    stock-reservation-failed: stock.reservation.failed
    payment-completed: payment.completed
    payment-failed: payment.failed
    stock-released: stock.released
    payment-requested: payment.requested
    order-confirmed: order.confirmed


feign:
  clients:
    cart-service:
      url: http://${CART_SERVICE_HOST:localhost}:${CART_SERVICE_PORT:8084}
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    org.n11bootcamp.orderservice: DEBUG
    org.hibernate.SQL: INFO
    root: INFO