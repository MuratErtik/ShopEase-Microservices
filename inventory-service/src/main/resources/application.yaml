server:
  port: 8083


spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:postgresql://localhost:5432/inventory_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      #
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
        prefetch: 10
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3

# RabbitMQ Exchange / Queue
messaging:
  exchanges:
    product: product.events
    inventory: inventory.events
    order: order.events
  queues:
    product-created: inventory.product.created.queue
    product-deleted: inventory.product.deleted.queue
    order-created: inventory.order.created.queue
    order-confirmed: inventory.order.confirmed.queue
    order-cancelled: inventory.order.cancelled.queue
  routing-keys:
    product-created: product.created
    product-deleted: product.deleted
    stock-reserved: stock.reserved
    stock-released: stock.released
    order-confirmed: order.confirmed
    order-created: order.created
    order-cancelled: order.cancelled
    stock-updated: stock.updated
    stock-reservation-failed: stock.reservation.failed

## Outbox scheduler
#outbox:
#  scheduler:
#    fixed-delay-ms: 5000
#    batch-size: 50

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    org.n11bootcamp.inventoryservice: DEBUG
    org.hibernate.SQL: INFO
    root: INFO