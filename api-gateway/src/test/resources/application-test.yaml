
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9999/realms/test/certs

  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 500ms
      timeout: 500ms



resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 1s

logging:
  level:
    org.n11bootcamp.apigateway: DEBUG
    org.springframework.cloud.gateway: WARN
    org.springframework.security: WARN