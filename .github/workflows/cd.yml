        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x gradlew
      - name: Build & Push image via Jib
        run: ./gradlew :notification-service:jib
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  build-order-service:
    name: Build & Push – order-service
    needs: detect-changes
    if: needs.detect-changes.outputs.order-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x gradlew
      - name: Build & Push image via Jib
        run: ./gradlew :order-service:jib
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  build-payment-service:
    name: Build & Push – payment-service
    needs: detect-changes
    if: needs.detect-changes.outputs.payment-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - run: chmod +x gradlew
      - name: Build & Push image via Jib
        run: ./gradlew :payment-service:jib
