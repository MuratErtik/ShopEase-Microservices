server:
  port: 8087

spring:
  application:
    name: user-service

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:user_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: UserServiceHikariPool

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ───────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Keycloak JWT  ────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/n11Ecommerce/protocol/openid-connect/certs}

  # ── WebClient ─────────────────────────────
  webflux:
    base-path: /

# ── Keycloak Admin ────────────────────────────────────────────────────────
keycloak:
  server-url: ${KEYCLOAK_URL:http://localhost:8080}
  realm: n11Ecommerce
  client-id: ${KEYCLOAK_CLIENT_ID:ecommerce-backend}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:3K950VgbzSpVGIKZXkuycboz8OdBds3f}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

# ── Cookie ────────────────────────────────────────────────────────────────
cookie:
  secure: ${COOKIE_SECURE:false}    # dev: false — prod: true

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    org.n11bootcamp.userservice: DEBUG
    org.springframework.security: INFO
    root: INFO